<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sign Up / Login</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="wrap">
  <div class="tab-bar">
    <button class="tab active" onclick="switchTab('login')">Log in</button>
    <button class="tab" onclick="switchTab('signup')">Sign up</button>
  </div>

  <div class="panel active" id="login">
    <button class="btn-social">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      Continue with Google
    </button>
    <div class="divider">or</div>
    <div class="field">
      <label for="l-email">Email address</label>
      <input type="email" id="l-email" placeholder="you@example.com" autocomplete="email" />
    </div>
    <div class="field">
      <label for="l-password">Password</label>
      <input type="password" id="l-password" placeholder="••••••••" autocomplete="current-password" />
    </div>
    <div class="forgot-row">
      <a class="forgot-link">Forgot password?</a>
    </div>
    <button class="btn-primary">Log in</button>
    <p class="footer-text">Don't have an account? <a onclick="switchTab('signup')">Sign up</a></p>
  </div>

  <div class="panel" id="signup">
    <button class="btn-social">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      Sign up with Google
    </button>
    <div class="divider">or</div>
    <div class="row">
      <div class="field">
        <label for="s-first">First name</label>
        <input type="text" id="s-first" placeholder="Jane" autocomplete="given-name" />
      </div>
      <div class="field">
        <label for="s-last">Last name</label>
        <input type="text" id="s-last" placeholder="Doe" autocomplete="family-name" />
      </div>
    </div>
    <div class="field">
      <label for="s-email">Email address</label>
      <input type="email" id="s-email" placeholder="you@example.com" autocomplete="email" />
    </div>
    <div class="field">
      <label for="s-password">Password</label>
      <input type="password" id="s-password" placeholder="••••••••" autocomplete="new-password" oninput="checkStrength(this.value)" />
      <div class="strength" id="strength-bars">
        <div class="strength-bar"></div>
        <div class="strength-bar"></div>
        <div class="strength-bar"></div>
        <div class="strength-bar"></div>
      </div>
      <p class="pwd-hint" id="pwd-hint">At least 8 characters</p>
    </div>
    <div class="check-row">
      <input type="checkbox" id="terms" />
      <label for="terms">I agree to the <a href="#">terms of service</a> and <a href="#">privacy policy</a></label>
    </div>
    <button class="btn-primary signup-btn">Create account</button>
    <p class="footer-text">Already have an account? <a onclick="switchTab('login')">Log in</a></p>
  </div>
</div>
<script src="script.js"></script>
</body>
</html>
