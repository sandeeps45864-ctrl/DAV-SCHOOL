<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1.0">

<title>
Admin Panel
</title>

<style>

body{

    font-family:Arial;

    padding:40px;

    background:#f5f5f5;

}

.container{

    max-width:500px;

    margin:auto;

    background:white;

    padding:40px;

    border-radius:20px;

}

h1{

    margin-bottom:30px;

}

input{

    margin:20px 0;

    width:100%;

}

button{

    padding:14px 20px;

    width:100%;

    border:none;

    background:#0B3D91;

    color:white;

    cursor:pointer;

    border-radius:10px;

}

</style>

</head>

<body>

<div class="container">

<h1>
Gallery Admin Panel
</h1>

<form id="galleryForm">

<input
type="file"
id="galleryImage"
required>

<button type="submit">

Upload Image

</button>

</form>

</div>

<script>

const backendURL =
"https://signup-login-1-b57h.onrender.com";

document
.getElementById(
"galleryForm"
)

.addEventListener(

"submit",

async(e)=>{

e.preventDefault();

const formData =
new FormData();

formData.append(

"image",

document.getElementById(
"galleryImage"
).files[0]

);

try{

await fetch(

backendURL +
"/api/gallery",

{

method:"POST",

body:formData

}

);

alert(
"Image Uploaded Successfully"
);

}catch(error){

alert(
"Upload Failed"
);

}

});

</script>

</body>
</html>
